<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Danh Sách Hoá Đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark px-4 py-3" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
    <a href="javascript:history.back()" class="text-white text-decoration-none">
        <i class="bi bi-arrow-left me-2"></i>Quay lại
    </a>
    <span class="navbar-brand mx-auto fw-bold" th:text="${pageTitle}"></span>
    <span></span>
</nav>

<div class="container-fluid py-4 px-4">
    <!-- Info header -->
    <div class="card border-0 shadow-sm mb-4" style="background: linear-gradient(135deg, #f5f7fa, #c3cfe2);">
        <div class="card-body d-flex align-items-center">
            <i class="bi bi-bag-check fs-2 text-danger me-3"></i>
            <div>
                <h5 class="mb-1">Hoá đơn bán cho trang phục: <span class="text-danger" th:text="${costumeName}">Tên</span></h5>
                <small class="text-muted">Mã: <code th:text="${costumeId}">ID</code></small>
            </div>
            <div class="ms-auto text-end">
                <div class="badge bg-danger fs-6" th:text="${bills != null ? #lists.size(bills) : 0} + ' hoá đơn'">0</div>
            </div>
        </div>
    </div>

    <div th:if="${bills == null or #lists.isEmpty(bills)}" class="text-center py-5 text-muted">
        <i class="bi bi-receipt-cutoff fs-1"></i>
        <p class="mt-2">Chưa có hoá đơn bán nào cho trang phục này</p>
    </div>

    <div th:unless="${bills == null or #lists.isEmpty(bills)}">
        <!-- Summary -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 bg-danger text-white shadow-sm">
                    <div class="card-body text-center">
                        <div class="fs-3 fw-bold" id="sumRevenue">-</div>
                        <small class="opacity-75">Tổng Doanh Thu (VND)</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 bg-warning text-white shadow-sm">
                    <div class="card-body text-center">
                        <div class="fs-3 fw-bold" id="sumQty">-</div>
                        <small class="opacity-75">Tổng Số Lượng Bán</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 bg-secondary text-white shadow-sm">
                    <div class="card-body text-center">
                        <div class="fs-3 fw-bold" th:text="${bills != null ? #lists.size(bills) : 0}">0</div>
                        <small class="opacity-75">Số Hoá Đơn</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bills Table -->
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="billTable">
                    <thead class="table-danger">
                    <tr>
                        <th>#</th>
                        <th>Mã Hoá Đơn</th>
                        <th>Khách Hàng</th>
                        <th class="text-end">Số Lượng</th>
                        <th class="text-end">Tổng Tiền (VND)</th>
                        <th>Thời Gian Thanh Toán</th>
                        <th>Loại KH</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="bill, iter : ${bills}">
                        <td th:text="${iter.index + 1}">1</td>
                        <td>
                            <span class="badge bg-secondary" th:text="'BILL-' + ${bill.billId}">ID</span>
                        </td>
                        <td>
                            <div class="fw-semibold" th:text="${bill.customerName}">Tên KH</div>
                        </td>
                        <td class="text-end fw-semibold" th:text="${bill.quantityBought}">0</td>
                        <td class="text-end fw-bold text-success">
                            <span th:text="${bill.totalAmount != null ? #numbers.formatDecimal(bill.totalAmount, 0, 'COMMA', 0, 'POINT') : '0'}">0</span>
                        </td>
                        <td>
                            <th:block th:if="${bill.paymentTime != null}">
                                <div th:text="${#temporals.format(bill.paymentTime, 'dd/MM/yyyy')}">Ngày</div>
                                <small class="text-muted" th:text="${#temporals.format(bill.paymentTime, 'HH:mm')}"></small>
                            </th:block>
                            <span th:if="${bill.paymentTime == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:if="${bill.customerId != null}" class="badge bg-success">
                                <i class="bi bi-person-check me-1"></i>Thành viên
                            </span>
                            <span th:unless="${bill.customerId != null}" class="badge bg-light text-muted border">
                                <i class="bi bi-person me-1"></i>Vãng lai
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const bills = /*[[${bills}]]*/ [];

    let sumRev = 0, sumQty = 0;
    bills.forEach(b => {
        sumRev += parseFloat(b.totalAmount) || 0;
        sumQty += parseInt(b.quantityBought) || 0;
    });
    const revEl = document.getElementById('sumRevenue');
    const qtyEl = document.getElementById('sumQty');
    if (revEl) revEl.textContent = sumRev.toLocaleString('vi-VN') + ' VND';
    if (qtyEl) qtyEl.textContent = sumQty.toLocaleString('vi-VN');
</script>
</body>
</html>
