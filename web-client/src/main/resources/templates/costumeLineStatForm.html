<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Thống Kê Doanh Thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .stat-card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3" style="background: rgba(0,0,0,0.15);">
    <a th:href="@{/}" class="text-white text-decoration-none">
        <i class="bi bi-arrow-left me-2"></i>Quay lại
    </a>
    <span class="navbar-brand mx-auto fw-bold" th:text="${pageTitle}"></span>
    <span></span>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card stat-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-bar-chart-line text-success" style="font-size: 3rem;"></i>
                        <h3 class="mt-2 fw-bold">Thống Kê Doanh Thu</h3>
                        <p class="text-muted">Chọn khoảng thời gian để xem báo cáo</p>
                    </div>
                    <div th:if="${timeRangeError}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span th:text="${timeRangeError}">Khoảng thời gian không hợp lệ.</span>
                    </div>

                    <form th:action="@{/statistics/costume-lines}" method="get">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-calendar-event me-1 text-success"></i>Từ ngày
                            </label>
                            <input type="datetime-local" class="form-control form-control-lg"
                                   name="startTime" id="startTime" required
                                   value="2025-01-01T00:00">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-calendar-check me-1 text-success"></i>Đến ngày
                            </label>
                            <input type="datetime-local" class="form-control form-control-lg"
                                   name="endTime" id="endTime" required
                                   value="2026-12-31T23:59">
                        </div>

                        <!-- Quick Presets -->
                        <div class="mb-4">
                            <p class="form-label fw-semibold text-muted mb-2">Chọn nhanh:</p>
                            <div class="d-flex flex-wrap gap-2">
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setRange(7)">7 ngày qua</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setRange(30)">30 ngày qua</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setRange(90)">3 tháng qua</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setRange(365)">1 năm qua</button>
                                <button type="button" class="btn btn-success btn-sm" onclick="setAll()">
                                    <i class="bi bi-collection me-1"></i>Tất cả data
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg fw-semibold">
                                <i class="bi bi-search me-2"></i>Xem Thống Kê
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function setRange(days) {
        const now = new Date();
        const start = new Date(now);
        start.setDate(start.getDate() - days);
        const fmt = (d) => d.toISOString().slice(0, 16);
        document.getElementById('startTime').value = fmt(start);
        document.getElementById('endTime').value = fmt(now);
    }

    function setAll() {
        document.getElementById('startTime').value = '2025-01-01T00:00';
        document.getElementById('endTime').value = '2026-12-31T23:59';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
