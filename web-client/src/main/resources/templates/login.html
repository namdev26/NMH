<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Costume Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px 36px;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            background: #1d4ed8;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 24px;
            color: white;
        }
        .logo h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
        }
        .logo p {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 2px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .tab.active {
            color: #1d4ed8;
            border-bottom-color: #1d4ed8;
        }

        /* Form sections */
        .section { display: none; }
        .section.active { display: block; }

        /* Alerts */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        /* Fields */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 15px;
        }
        input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
        }
        input::placeholder { color: #d1d5db; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.15s;
        }
        .btn-primary { background: #1d4ed8; color: white; }
        .btn-primary:hover { background: #1e40af; }
        .btn-green { background: #16a34a; color: white; }
        .btn-green:hover { background: #15803d; }

        .switch-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.83rem;
            color: #6b7280;
        }
        .switch-hint button {
            background: none;
            border: none;
            color: #1d4ed8;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.83rem;
        }
        .switch-hint button:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="bi bi-shop"></i></div>
        <h1>Costume Store</h1>
        <p>Hệ thống quản lý trang phục</p>
    </div>

    <div class="tabs">
        <button class="tab" id="tabLogin" onclick="switchTab('login')">Đăng nhập</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <!-- LOGIN -->
    <div class="section" id="sectionLogin">

        <div th:if="${error}" class="alert alert-error">
            <i class="bi bi-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success">
            <i class="bi bi-check-circle"></i>
            <span th:text="${message}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label for="username">Tên đăng nhập</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input id="username" name="username" type="text"
                           placeholder="Nhập username" th:value="${username}" required>
                </div>
            </div>
            <div class="field">
                <label for="password">Mật khẩu</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input id="password" name="password" type="password"
                           placeholder="Nhập mật khẩu" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>

        <div class="switch-hint">
            Chưa có tài khoản?
            <button onclick="switchTab('register')">Đăng ký ngay</button>
        </div>
    </div>

    <!-- REGISTER -->
    <div class="section" id="sectionRegister">

        <div th:if="${registerError}" class="alert alert-error">
            <i class="bi bi-exclamation-circle"></i>
            <span th:text="${registerError}"></span>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="field">
                <label for="reg-username">Tên đăng nhập *</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input id="reg-username" name="username" type="text"
                           placeholder="Tối thiểu 3 ký tự" th:value="${regUsername}"
                           required minlength="3">
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Mật khẩu *</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input id="reg-password" name="password" type="password"
                               placeholder="Tối thiểu 6 ký tự" required minlength="6">
                    </div>
                </div>
                <div class="field">
                    <label>Xác nhận *</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock-fill"></i>
                        <input id="reg-confirm" name="confirmPassword" type="password"
                               placeholder="Nhập lại" required>
                    </div>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Họ</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-badge"></i>
                        <input name="firstName" type="text" placeholder="Họ" th:value="${regFirstName}">
                    </div>
                </div>
                <div class="field">
                    <label>Tên</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-badge"></i>
                        <input name="lastName" type="text" placeholder="Tên" th:value="${regLastName}">
                    </div>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Thành phố</label>
                    <div class="input-wrap">
                        <i class="bi bi-geo-alt"></i>
                        <input name="city" type="text" placeholder="VD: Hà Nội" th:value="${regCity}">
                    </div>
                </div>
                <div class="field">
                    <label>Địa chỉ</label>
                    <div class="input-wrap">
                        <i class="bi bi-house"></i>
                        <input name="street" type="text" placeholder="Số nhà, đường" th:value="${regStreet}">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-green">Tạo tài khoản</button>
        </form>

        <div class="switch-hint">
            Đã có tài khoản?
            <button onclick="switchTab('login')">Đăng nhập</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('sectionLogin').classList.toggle('active', tab === 'login');
        document.getElementById('sectionRegister').classList.toggle('active', tab === 'register');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    }

    // Khởi tạo tab từ server
    const activeTab = /*[[${activeTab}]]*/ 'login';
    switchTab(activeTab);

    // Validate confirm password
    const pwd = document.getElementById('reg-password');
    const cfm = document.getElementById('reg-confirm');
    if (cfm && pwd) {
        function checkMatch() {
            cfm.setCustomValidity(cfm.value && cfm.value !== pwd.value ? 'Mật khẩu không khớp' : '');
        }
        cfm.addEventListener('input', checkMatch);
        pwd.addEventListener('input', checkMatch);
    }
</script>
</body>
</html>
