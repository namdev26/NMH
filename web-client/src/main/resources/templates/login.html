<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Costume Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #60a5fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            border: none;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
            overflow: hidden;
        }
        .brand-panel {
            background: linear-gradient(160deg, #111827 0%, #1e3a8a 100%);
            color: #fff;
            padding: 32px;
        }
        .form-panel {
            padding: 32px;
            background: #fff;
        }
        .input-group-text {
            background: #f8fafc;
        }
        .btn-login {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="brand-panel text-center">
        <div class="mb-3">
            <i class="bi bi-shop fs-1"></i>
        </div>
        <h1 class="h3 fw-bold mb-2">Costume Store</h1>
        <p class="mb-0 text-white-50">Đăng nhập tài khoản quản lý để truy cập hệ thống.</p>
    </div>
    <div class="form-panel">
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

        <form th:action="@{/login}" method="post" class="d-grid gap-3">
            <div>
                <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input id="username" name="username" type="text" class="form-control" placeholder="Nhập username"
                           th:value="${username}" required>
                </div>
            </div>

            <div>
                <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input id="password" name="password" type="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
            </button>
        </form>
    </div>
</div>
</body>
</html>
